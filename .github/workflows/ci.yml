name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set Python version
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: api
        run: uv sync --dev

      - name: Ruff lint
        working-directory: api
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        working-directory: api
        run: uv run ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set Python version
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: api
        run: uv sync --dev

      - name: Run tests
        working-directory: api
        run: uv run pytest tests/ --cov=ai_usage_dashboard --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build ./api -t ai-usage-dashboard-api:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy (not yet implemented)
        run: echo "Deployment step — configure target environment and credentials here"
